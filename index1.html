<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ying-Hul - Bento Portfolio (UI/UX Pro Max)</title>
    
    <!-- 引入高品質字體：Outfit (標題) + Space Grotesk (數字/代碼) + Plus Jakarta Sans (內文) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* UI/UX Pro Max 設計系統變數 */
        :root {
            --bg-color: #030712; /* OLED 極致暗黑 */
            --card-bg: rgba(255, 255, 255, 0.015);
            --card-border: rgba(255, 255, 255, 0.05);
            --card-border-hover: rgba(255, 255, 255, 0.15);
            
            /* 霓虹與強調色 */
            --primary: #6366f1; /* AI 經典紫 */
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent-cyan: #22d3ee;
            --accent-pink: #f472b6;
            --accent-amber: #f59e0b;
            
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --font-title: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'Space Grotesk', sans-serif;
        }

        /* 基礎重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 60px;
        }

        /* 背景 Canvas 特效 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 漸層光圈裝飾 */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(99, 102, 241, 0) 70%);
            top: -200px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.05) 0%, rgba(34, 211, 238, 0) 70%);
            bottom: -200px;
            right: -200px;
            z-index: 0;
            pointer-events: none;
        }

        /* 排版容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Bento Grid 佈局主體 */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Bento 卡片通用樣式 */
        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s, transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Spotlight 追光特效 */
        .bento-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(350px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255, 255, 255, 0.04), transparent 45%);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .bento-card:hover::before {
            opacity: 1;
        }

        .bento-card:hover {
            border-color: var(--card-border-hover);
            transform: translateY(-2px);
        }

        /* 內容元件保證在 Spotlight 之上 */
        .bento-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- 卡片 1: 個人檔案 (大) --- */
        .card-profile {
            grid-column: span 2;
            grid-row: span 2;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
        }

        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 50%, var(--accent-pink) 100%);
            z-index: -1;
            padding: 4px;
            animation: gradient-rotate 6s linear infinite;
        }

        @keyframes gradient-rotate {
            100% { transform: rotate(360deg); }
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-color);
        }

        .profile-name {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .profile-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .profile-tag:hover {
            color: var(--accent-cyan);
        }

        .profile-bio {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .profile-badges {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
        }

        /* --- 卡片 2: 數據統計 (中) --- */
        .card-stats {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            height: 100%;
            align-items: center;
        }

        .stat-block {
            text-align: center;
        }

        .stat-num {
            font-family: var(--font-code);
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #fff 60%, var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- 卡片 3: 技術與社群 (中) --- */
        .card-skills {
            grid-column: span 1;
        }

        .skills-title {
            font-family: var(--font-title);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            font-family: var(--font-code);
            font-size: 0.8rem;
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .skill-tag:hover {
            background: var(--primary);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* --- 卡片 4: 搜尋控制面板 (大) --- */
        .card-controls {
            grid-column: span 3;
            padding: 20px 30px;
        }

        .controls-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .search-box-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 450px;
        }

        .search-icon-inside {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 18px;
            height: 18px;
        }

        .bento-search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px 16px 12px 48px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .bento-search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .filter-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .bento-select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .bento-select:focus {
            border-color: var(--primary);
        }

        /* 語言快速篩選區 */
        .quick-lang-filters {
            grid-column: span 3;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .bento-filter-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 8px 18px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }

        .bento-filter-btn:hover {
            color: #fff;
            border-color: var(--card-border-hover);
        }

        .bento-filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        /* 儲存庫展示網格 (Bento風格卡片) */
        .repos-grid-bento {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        /* 儲存庫卡片 */
        .repo-bento-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 26px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: border-color 0.3s, transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        .repo-bento-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(350px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255, 255, 255, 0.04), transparent 45%);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .repo-bento-card:hover::before {
            opacity: 1;
        }

        .repo-bento-card:hover {
            border-color: var(--card-border-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 15px var(--primary-glow);
        }

        .card-top {
            position: relative;
            z-index: 1;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 10px;
        }

        .repo-bento-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .repo-bento-title:hover {
            color: var(--accent-cyan);
        }

        .fork-badge {
            font-family: var(--font-code);
            font-size: 0.7rem;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--accent-amber);
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .repo-bento-desc {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-bottom {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 16px;
        }

        .bento-meta-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .bento-lang {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .bento-lang-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .bento-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .bento-links {
            display: flex;
            gap: 8px;
        }

        /* 帶有色彩漸層發光的按鈕，具有 Neo-brutalism 邊框 */
        .bento-link-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .bento-link-btn:hover {
            color: #fff;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.05);
        }

        /* --- Skeleton 骨架屏樣式 --- */
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.02) 25%,
                rgba(255, 255, 255, 0.07) 37%,
                rgba(255, 255, 255, 0.02) 63%
            );
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .skeleton-circle { width: 160px; height: 160px; border-radius: 50%; }
        .skeleton-block { height: 16px; border-radius: 6px; margin-bottom: 12px; }
        .skeleton-head { height: 32px; width: 60%; border-radius: 8px; margin-bottom: 16px; }

        /* 頁尾 */
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 30px;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            color: var(--accent-cyan);
            text-decoration: underline;
        }

        /* 響應式佈局調整 */
        @media (max-width: 1024px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .card-profile {
                grid-column: span 2;
            }
            .card-controls {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
            .card-profile {
                grid-column: span 1;
                flex-direction: column;
                text-align: center;
            }
            .card-controls {
                grid-column: span 1;
            }
            .controls-inner {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box-wrapper {
                max-width: 100%;
            }
        }

        /* 驗證碼認證 Liquid Glass 遮罩樣式 */
        #captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #captcha-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .captcha-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            z-index: 10000;
        }

        .captcha-title {
            font-family: var(--font-title);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 50%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .captcha-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .captcha-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #captcha-canvas {
            background: #fff;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .captcha-refresh {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
            width: 38px;
            height: 38px;
        }

        .captcha-refresh:hover {
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
            background: rgba(34, 211, 238, 0.05);
            transform: rotate(180deg);
        }

        .captcha-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 14px 20px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
            font-family: var(--font-code);
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .captcha-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .captcha-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 16px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.2s;
            font-family: var(--font-title);
        }

        .captcha-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .captcha-error {
            color: var(--accent-pink);
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .captcha-error.show {
            opacity: 1;
        }

        /* 網頁主體動畫控制 */
        .container {
            opacity: 0;
            filter: blur(15px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .container.unlocked {
            opacity: 1;
            filter: blur(0);
        }
    </style>
</head>
<body>

    <!-- 驗證碼認證遮罩 -->
    <div id="captcha-overlay">
        <div class="captcha-card">
            <h2 class="captcha-title"><i data-lucide="shield-check" style="color: var(--accent-cyan); width: 24px; height: 24px;"></i>安全驗證</h2>
            <p class="captcha-desc">請輸入下方的驗證碼以瀏覽 GitHub 儲存庫展示網頁。</p>
            <div class="captcha-row">
                <canvas id="captcha-canvas" width="120" height="40" title="點擊重新整理驗證碼"></canvas>
                <button type="button" class="captcha-refresh" id="btn-captcha-refresh" title="重新整理驗證碼">

    <script>
        const USERNAME = 'Ying-Hul';
        const API_USER = `https://api.github.com/users/${USERNAME}`;
        const API_REPOS = `https://api.github.com/users/${USERNAME}/repos?per_page=100`;

        let reposData = [];
        let activeLanguage = 'All';
        let currentCaptcha = '';

        const LANG_COLORS = {
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Python': '#3572A5',
            'Go': '#00ADD8',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'C#': '#178600',
            'Ruby': '#701516',
            'PHP': '#4F5D95',
            'Swift': '#F05138',
            'Kotlin': '#A97BFF',
            'Rust': '#dea584',
            'Vue': '#41b883',
            'React': '#61dafb'
        };

        // 寫入當前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // 頁面加載完成後初始化
        window.addEventListener('DOMContentLoaded', () => {
            initBackgroundEffects();
            initCaptcha();
        });

        // 驗證碼認證機制
        function initCaptcha() {
            generateCaptcha();

            const canvas = document.getElementById('captcha-canvas');
            const btnRefresh = document.getElementById('btn-captcha-refresh');
            const btnSubmit = document.getElementById('btn-captcha-submit');
            const input = document.getElementById('captcha-input');
            const errorDiv = document.getElementById('captcha-error');

            // 點擊驗證碼圖片或重新整理按鈕時更換
            canvas.addEventListener('click', generateCaptcha);
            btnRefresh.addEventListener('click', generateCaptcha);

            // 輸入框按 Enter 即可送出
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    verifyCaptcha();
                }
            });

            btnSubmit.addEventListener('click', verifyCaptcha);

            function verifyCaptcha() {
                const userVal = input.value.trim().toUpperCase();
                if (userVal === currentCaptcha) {
                    // 驗證成功，解鎖網頁
                    errorDiv.classList.remove('show');
                    
                    const overlay = document.getElementById('captcha-overlay');
                    overlay.classList.add('fade-out');
                    
                    const container = document.querySelector('.container');
                    container.classList.add('unlocked');

                    // 載入資料
                    fetchUserProfile();
                    fetchUserRepos();
                    setupEventListeners();
                } else {
                    // 驗證失敗，顯示錯誤
                    errorDiv.classList.add('show');
                    input.value = '';
                    generateCaptcha();
                    input.focus();
                }
            }
        }

        // 生成驗證碼
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 排除易混淆的 0, O, 1, I
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = code;
            drawCaptcha(code);
        }

        // 在 Canvas 上繪製驗證碼
        function drawCaptcha(code) {
            const canvas = document.getElementById('captcha-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製背景漸層
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#f9fafb');
            grad.addColorStop(1, '#e5e7eb');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製干擾線
            for (let i = 0; i < 4; i++) {
                ctx.strokeStyle = getRandomColor(120, 200);
                ctx.lineWidth = Math.random() * 1.5 + 0.5;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }

            // 繪製干擾點
            for (let i = 0; i < 40; i++) {
                ctx.fillStyle = getRandomColor(150, 230);
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.8, 0, Math.PI * 2);
                ctx.fill();
            }

            // 繪製字元
            ctx.font = 'bold 24px "Space Grotesk", "Outfit", sans-serif';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < code.length; i++) {
                ctx.fillStyle = getRandomColor(20, 90);
                
                ctx.save();
                const x = 15 + i * 26 + Math.random() * 6;
                const y = canvas.height / 2 + (Math.random() * 8 - 4);
                const angle = (Math.random() * 40 - 20) * Math.PI / 180;
                
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillText(code[i], 0, 0);
                ctx.restore();
            }
        }

        // 取得隨機色
        function getRandomColor(min, max) {
            const r = Math.floor(Math.random() * (max - min) + min);
            const g = Math.floor(Math.random() * (max - min) + min);
            const b = Math.floor(Math.random() * (max - min) + min);
            return `rgb(${r},${g},${b})`;
        }

        // 1. 動態 Canvas 背景特效：流星與星空粒子
        function initBackgroundEffects() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            
            let stars = [];
            let meteors = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // 生成靜態繁星
            for (let i = 0; i < 70; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2,
                    alpha: Math.random() * 0.8 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    direction: Math.random() > 0.5 ? 1 : -1
                });
            }

            // 定時生成流星
            setInterval(() => {
                if (meteors.length < 3) {
                    meteors.push({
                        x: Math.random() * canvas.width,
                        y: 0,
                        len: Math.random() * 80 + 40,
                        speed: Math.random() * 6 + 4,
                        dx: Math.random() * 3 + 2, // 向右下角飄
                        dy: Math.random() * 3 + 4,
                        alpha: 1
                    });
                }
            }, 4000);

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 畫星星
                stars.forEach(star => {
                    star.alpha += star.twinkleSpeed * star.direction;
                    if (star.alpha > 1) {
                        star.alpha = 1;
                        star.direction = -1;
                    } else if (star.alpha < 0.2) {
                        star.alpha = 0.2;
                        star.direction = 1;
                    }
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 畫流星
                for (let i = meteors.length - 1; i >= 0; i--) {
                    let m = meteors[i];
                    m.x += m.speed;
                    m.y += m.dy;
                    m.alpha -= 0.015;

                    if (m.alpha <= 0 || m.x > canvas.width || m.y > canvas.height) {
                        meteors.splice(i, 1);
                        continue;
                    }

                    ctx.strokeStyle = `rgba(99, 102, 241, ${m.alpha})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(m.x, m.y);
                    ctx.lineTo(m.x - m.len, m.y - m.len * (m.dy / m.speed));
                    ctx.stroke();
                }

                requestAnimationFrame(animate);
            }
            animate();
        }

        // 2. 獲取 GitHub 用戶資料
        async function fetchUserProfile() {
            try {
                const response = await fetch(API_USER);
                if (!response.ok) throw new Error();
                const user = await response.json();
                renderUserProfile(user);
            } catch (e) {
                renderProfileError();
            }
        }

        // 3. 獲取 GitHub 儲存庫
        async function fetchUserRepos() {
            try {
                const response = await fetch(API_REPOS);
                if (!response.ok) throw new Error();
                reposData = await response.json();

                renderLanguageStats();
                renderBentoFilters();
                filterAndRenderBentoRepos();
            } catch (e) {
                renderReposError();
            }
        }

        // 4. 渲染個人檔案卡片內容
        function renderUserProfile(user) {
            const container = document.getElementById('profile-card-container');
            const bioText = user.bio || "這位開發者很神秘，還沒有填寫個人簡介。";
            
            const locationHtml = user.location ? `<div class="badge-item"><i data-lucide="map-pin" style="width: 14px; height: 14px;"></i><span>${user.location}</span></div>` : '';
            const blogHtml = user.blog ? `<div class="badge-item"><i data-lucide="link" style="width: 14px; height: 14px;"></i><a href="${user.blog.startsWith('http') ? user.blog : 'https://' + user.blog}" target="_blank" style="color: inherit; text-decoration: none;">${user.blog}</a></div>` : '';
            const companyHtml = user.company ? `<div class="badge-item"><i data-lucide="briefcase" style="width: 14px; height: 14px;"></i><span>${user.company}</span></div>` : '';

            container.innerHTML = `
                <div class="avatar-wrapper">
                    <img src="${user.avatar_url}" alt="${user.name || user.login}" class="profile-avatar">
                </div>
                <div class="bento-content" style="width: 100%;">
                    <h1 class="profile-name">${user.name || user.login}</h1>
                    <a href="${user.html_url}" target="_blank" class="profile-tag">
                        @${user.login} <i data-lucide="external-link" style="width: 14px; height: 14px;"></i>
                    </a>
                    <p class="profile-bio">${bioText}</p>
                    <div class="profile-badges">
                        ${locationHtml}
                        ${companyHtml}
                        ${blogHtml}
                    </div>
                </div>
            `;
            
            // 更新統計卡片的數據
            const statsContainer = document.getElementById('stats-card-container');
            const totalStars = reposData.reduce((acc, repo) => acc + repo.stargazers_count, 0);

            statsContainer.innerHTML = `
                <div class="bento-content" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                    <h3 class="skills-title"><i data-lucide="bar-chart-2" style="width: 18px; color: var(--accent-pink);"></i>統計數據</h3>
                    <div class="stats-grid">
                        <div class="stat-block">
                            <div class="stat-num">${user.public_repos}</div>
                            <div class="stat-desc">Repos</div>
                        </div>
                        <div class="stat-block">
                            <div class="stat-num">${user.followers}</div>
                            <div class="stat-desc">Followers</div>
                        </div>
                        <div class="stat-block">
                            <div class="stat-num">${totalStars}</div>
                            <div class="stat-desc">Stars</div>
                        </div>
                    </div>
                </div>
            `;

            // 重新載入 Lucide Icons
            lucide.createIcons();
            initSpotlightEffects();
        }

        function renderProfileError() {
            document.getElementById('profile-card-container').innerHTML = `
                <div class="bento-content">
                    <h1 class="profile-name" style="color: var(--accent-pink); -webkit-text-fill-color: initial;">載入失敗</h1>
                    <p class="profile-bio">無法載入 GitHub 使用者 ${USERNAME} 的資料。</p>
                </div>
            `;
        }

        // 5. 統計語言並渲染至技術棧卡片
        function renderLanguageStats() {
            const container = document.getElementById('skills-list-container');
            const langs = {};
            
            reposData.forEach(repo => {
                if (repo.language) {
                    langs[repo.language] = (langs[repo.language] || 0) + 1;
                }
            });

            const sortedLangs = Object.keys(langs).sort((a, b) => langs[b] - langs[a]);
            
            if (sortedLangs.length === 0) {
                container.innerHTML = `<span class="skill-tag">No language data found</span>`;
                return;
            }

            // 顯示前 8 個主要程式語言
            let html = '';
            sortedLangs.slice(0, 8).forEach(lang => {
                html += `<span class="skill-tag">${lang}</span>`;
            });
            container.innerHTML = html;
        }

        // 6. 渲染語言快速篩選按鈕
        function renderBentoFilters() {
            const container = document.getElementById('bento-languages-container');
            const langs = {};
            
            reposData.forEach(repo => {
                if (repo.language) {
                    langs[repo.language] = (langs[repo.language] || 0) + 1;
                }
            });

            const sortedLangs = Object.keys(langs).sort((a, b) => langs[b] - langs[a]);
            
            let html = `<button class="bento-filter-btn active" data-lang="All">全部專案 (All)</button>`;
            sortedLangs.forEach(lang => {
                html += `<button class="bento-filter-btn" data-lang="${lang}">${lang} (${langs[lang]})</button>`;
            });

            container.innerHTML = html;

            container.querySelectorAll('.bento-filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    container.querySelectorAll('.bento-filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    activeLanguage = e.target.getAttribute('data-lang');
                    filterAndRenderBentoRepos();
                });
            });
        }

        // 7. 篩選與渲染儲存庫卡片
        function filterAndRenderBentoRepos() {
            const container = document.getElementById('bento-repos-container');
            const query = document.getElementById('bento-search').value.toLowerCase();
            const sortBy = document.getElementById('bento-sort').value;

            // 篩選
            let filtered = reposData.filter(repo => {
                const matchesSearch = repo.name.toLowerCase().includes(query) || 
                                     (repo.description && repo.description.toLowerCase().includes(query));
                const matchesLang = activeLanguage === 'All' || repo.language === activeLanguage;
                return matchesSearch && matchesLang;
            });

            // 排序
            filtered.sort((a, b) => {
                if (sortBy === 'stars') {
                    return b.stargazers_count - a.stargazers_count;
                } else if (sortBy === 'forks') {
                    return b.forks_count - a.forks_count;
                } else if (sortBy === 'name') {
                    return a.name.localeCompare(b.name);
                } else {
                    return new Date(b.updated_at) - new Date(a.updated_at);
                }
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted);">
                        <i data-lucide="folder-search" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                        <p style="font-family: var(--font-title); font-weight: 600;">找不到任何符合條件的專案</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = '';
            filtered.forEach(repo => {
                const isFork = repo.fork ? `<span class="fork-badge">Fork</span>` : '';
                const langColor = LANG_COLORS[repo.language] || '#9ca3af';
                const langHtml = repo.language ? `
                    <div class="bento-lang">
                        <span class="bento-lang-dot" style="background-color: ${langColor}; color: ${langColor};"></span>
                        <span>${repo.language}</span>
                    </div>
                ` : '';

                const homepageBtn = repo.homepage ? `
                    <a href="${repo.homepage.startsWith('http') ? repo.homepage : 'https://' + repo.homepage}" target="_blank" class="bento-link-btn" title="Live Demo">
                        <i data-lucide="external-link" style="width: 16px; height: 16px;"></i>
                    </a>
                ` : '';

                const description = repo.description || "這個專案沒有填寫詳細描述。";

                html += `
                    <div class="repo-bento-card">
                        <div class="card-top">
                            <div class="card-header-row">
                                <a href="${repo.html_url}" target="_blank" class="repo-bento-title" title="${repo.name}">
                                    <i data-lucide="folder-git-2" style="width: 18px; color: var(--primary);"></i>
                                    ${repo.name}
                                </a>
                                ${isFork}
                            </div>
                            <p class="repo-bento-desc">${description}</p>
                        </div>
                        <div class="card-bottom">
                            <div class="bento-meta-left">
                                ${langHtml}
                                <div class="bento-stat" title="星星數">
                                    <i data-lucide="star" style="width: 14px; height: 14px; fill: rgba(255,255,255,0.05);"></i>
                                    <span>${repo.stargazers_count}</span>
                                </div>
                                <div class="bento-stat" title="Fork 數">
                                    <i data-lucide="git-fork" style="width: 14px; height: 14px;"></i>
                                    <span>${repo.forks_count}</span>
                                </div>
                            </div>
                            <div class="bento-links">
                                ${homepageBtn}
                                <a href="${repo.html_url}" target="_blank" class="bento-link-btn" title="GitHub 儲存庫">
                                    <i data-lucide="github" style="width: 16px; height: 16px;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            lucide.createIcons();
            initSpotlightEffects();
        }

        function renderReposError() {
            document.getElementById('bento-repos-container').innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--accent-pink);">
                    <i data-lucide="alert-circle" style="width: 48px; height: 48px; margin-bottom: 16px;"></i>
                    <p>載入儲存庫時發生錯誤，請稍候重試。</p>
                </div>
            `;
            lucide.createIcons();
        }

        // 8. 監聽搜尋與排序
        function setupEventListeners() {
            const searchInput = document.getElementById('bento-search');
            const sortSelect = document.getElementById('bento-sort');

            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterAndRenderBentoRepos();
                }, 300);
            });

            sortSelect.addEventListener('change', () => {
                filterAndRenderBentoRepos();
            });
        }

        // 9. Spotlight 追光特效初始化 (滑鼠移動時更新滑鼠座標變數)
        function initSpotlightEffects() {
            const cards = document.querySelectorAll('.bento-card, .repo-bento-card');
            cards.forEach(card => {
                card.removeEventListener('mousemove', updateSpotlight);
                card.addEventListener('mousemove', updateSpotlight);
            });
        }

        function updateSpotlight(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            this.style.setProperty('--mouse-x', `${x}px`);
            this.style.setProperty('--mouse-y', `${y}px`);
        }
    </script>
</body>
</html>
